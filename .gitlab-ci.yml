stages:
  - validate
  - deploy

variables:
  DOCKER_DRIVER: overlay2

validate_project:
  stage: validate
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - |
      uv sync --group dev
      uv run python -m py_compile $(find src -name '*.py' -print)
      uv run --group dev python -m pytest tests -q
      uv run python -c "import anyio, json; from tick_mcp.http_app import health; response = anyio.run(health, None); assert response.status_code == 200; payload = json.loads(response.body); assert payload['product'] == 'tick-mcp'; assert payload['transport'] == 'streamable-http'; print('tick-mcp HTTP smoke test OK')"

deploy_homelab:
  stage: deploy
  tags:
    - homelab
  only:
    - main
  needs:
    - validate_project
  script:
    - echo "🚀 Deploying tick-mcp to the homelab..."
    - cd deploy
    - echo "TICKTICK_API_TOKEN=$TICKTICK_API_TOKEN" > .env
    - echo "TICKTICK_SESSION_TOKEN=$TICKTICK_SESSION_TOKEN" >> .env
    - echo "TICKTICK_USERNAME=$TICKTICK_USERNAME" >> .env
    - echo "TICKTICK_PASSWORD=$TICKTICK_PASSWORD" >> .env
    - echo "TELEGRAM_TICK_HOMELAB_TOKEN=$TELEGRAM_TICK_HOMELAB_TOKEN" >> .env
    - echo "TELEGRAM_CHAT_IDS=$TELEGRAM_CHAT_IDS" >> .env
    - echo "TICK_MCP_HTTP_HOST=0.0.0.0" >> .env
    - echo "TICK_MCP_HTTP_PORT=8091" >> .env
    - echo "TICK_MCP_HTTP_MCP_PATH=/mcp" >> .env
    - echo "TICK_MCP_ADMIN_ENV_FILE=/data/tick-admin.env" >> .env
    - echo "TICK_MCP_PUBLIC_BASE_URL=https://tick.kpihx-labs.com" >> .env
    - echo "TICK_MCP_FALLBACK_BASE_URL=https://tick.homelab" >> .env
    - docker compose config -q
    - docker compose up -d --build --remove-orphans
    - |
      for attempt in $(seq 1 20); do
        status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}' tick-mcp 2>/dev/null || true)"
        if [ "$status" = "healthy" ]; then
          break
        fi
        if [ "$status" = "unhealthy" ]; then
          docker logs --tail 200 tick-mcp
          exit 1
        fi
        sleep 3
      done
    - docker inspect --format '{{.State.Health.Status}}' tick-mcp | grep -qx healthy
    - docker exec tick-mcp curl -fsS http://127.0.0.1:8091/health
    - docker image prune -f

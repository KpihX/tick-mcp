name: tick-mcp

services:
  tick-mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: tick-mcp
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - tick_mcp_data:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8091/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tick-mcp-private.rule=Host(`tick.kpihx-labs.com`)"
      - "traefik.http.routers.tick-mcp-private.entrypoints=websecure"
      - "traefik.http.routers.tick-mcp-private.tls=true"
      - "traefik.http.routers.tick-mcp-private.tls.certresolver=myresolver"
      - "traefik.http.routers.tick-mcp-private.middlewares=tick-mcp-headers"
      - "traefik.http.routers.tick-mcp-fallback.rule=Host(`tick.homelab`)"
      - "traefik.http.routers.tick-mcp-fallback.entrypoints=websecure"
      - "traefik.http.routers.tick-mcp-fallback.tls=true"
      - "traefik.http.routers.tick-mcp-fallback.middlewares=tick-mcp-headers"
      - "traefik.http.services.tick-mcp.loadbalancer.server.port=8091"
      - "traefik.http.middlewares.tick-mcp-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.tick-mcp-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.tick-mcp-headers.headers.framedeny=true"

networks:
  proxy:
    external: true

volumes:
  tick_mcp_data:
    name: deploy_tick_mcp_data
